<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="1090" viewBox="0 0 1480 1090" font-family="Inter, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <marker id="arrowNew" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#15803d"/>
    </marker>
    <marker id="arrowDash" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1480" height="1090" fill="#f8fafc"/>

  <!-- Title -->
  <text x="740" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Adding a Qdrant route + sub-agent to the existing agent graph</text>
  <text x="740" y="62" text-anchor="middle" font-size="13" fill="#475569">Green dashed = new in this change. The Qdrant lane mirrors the SQL lane (route → tool → sub-agent → datastore).</text>

  <!-- Design-decision callout -->
  <g>
    <rect x="40" y="92" width="470" height="196" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-dasharray="5 4"/>
    <text x="60" y="116" font-size="13" font-weight="700" fill="#92400e">Design decision (read first)</text>
    <text x="60" y="140" font-size="11.5" fill="#7c2d12">A vector store fits the existing RAG lane. The "rag"</text>
    <text x="60" y="156" font-size="11.5" fill="#7c2d12">route = "retrieve from a vector source, then synthesize".</text>
    <text x="60" y="172" font-size="11.5" fill="#7c2d12">Airweave is just one provider on it.</text>
    <text x="60" y="196" font-size="11.5" fill="#7c2d12">Add a dedicated qdrant route + sub-agent ONLY if</text>
    <text x="60" y="212" font-size="11.5" fill="#7c2d12">queries need reasoning: building payload/metadata</text>
    <text x="60" y="228" font-size="11.5" fill="#7c2d12">filters, tuning top-k / score threshold, iterative re-query.</text>
    <text x="60" y="252" font-size="11.5" fill="#166534" font-weight="700">Minimal path: if it's plain embed - top-k, add ONLY a</text>
    <text x="60" y="268" font-size="11.5" fill="#166534" font-weight="700">QdrantCollectionProvider.search() on the rag lane —</text>
    <text x="60" y="284" font-size="11.5" fill="#166534" font-weight="700">no new route, no new agent (mirrors Airweave).</text>
  </g>

  <!-- SSE events note -->
  <g>
    <rect x="1010" y="92" width="430" height="74" rx="10" fill="#fff" stroke="#cbd5e1" stroke-dasharray="5 4"/>
    <text x="1225" y="114" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">Streams back to UI (SSE)</text>
    <text x="1225" y="132" text-anchor="middle" font-size="10.5" fill="#64748b">searching · sql_* · chunk · done · complete</text>
    <text x="1225" y="150" text-anchor="middle" font-size="10.5" fill="#166534">+ new: qdrant_planning · qdrant_searching · qdrant_executed</text>
  </g>

  <!-- ===== EDGES ===== -->
  <g stroke="#334155" stroke-width="1.6" fill="none" marker-end="url(#arrow)">
    <path d="M740,144 L740,170"/>
    <path d="M740,226 L740,242"/>
    <!-- router -> outer agent -->
    <path d="M700,300 C640,330 600,340 575,356"/>
    <!-- router fast-paths to tools -->
    <path d="M700,300 C480,330 250,360 185,514"/>
    <path d="M770,300 C778,360 780,420 780,514"/>
    <!-- outer agent -> tools -->
    <path d="M470,452 C330,490 240,500 190,516"/>
    <path d="M620,452 C710,488 755,500 775,516"/>
    <!-- SQL column -->
    <path d="M180,576 L180,604"/>
    <path d="M180,654 L180,682"/>
    <path d="M180,770 L180,798"/>
    <path d="M180,846 L180,872"/>
    <!-- Airweave column -->
    <path d="M780,576 L780,604"/>
    <path d="M780,654 L780,682"/>
    <path d="M780,756 L780,798"/>
  </g>

  <!-- NEW edges (green dashed) -->
  <g stroke="#15803d" stroke-width="2" fill="none" stroke-dasharray="7 4" marker-end="url(#arrowNew)">
    <!-- router fast-path -> qdrant tool -->
    <path d="M860,290 C1120,330 1290,380 1300,514"/>
    <!-- outer agent -> qdrant tool -->
    <path d="M690,448 C1010,500 1180,505 1300,516"/>
    <!-- qdrant column -->
    <path d="M1300,576 L1300,604"/>
    <path d="M1300,698 L1300,726"/>
    <path d="M1300,778 L1300,804"/>
  </g>

  <!-- edge label chips -->
  <g font-size="11.5" fill="#1e293b">
    <rect x="300" y="392" width="150" height="20" rx="4" fill="#e2e8f0"/><text x="375" y="406" text-anchor="middle">route=sql · runSqlRoute</text>
    <rect x="690" y="392" width="156" height="20" rx="4" fill="#e2e8f0"/><text x="768" y="406" text-anchor="middle">route=rag · runRagRoute</text>
    <rect x="980" y="372" width="230" height="20" rx="4" fill="#dcfce7"/><text x="1095" y="386" text-anchor="middle" fill="#166534" font-weight="700">route=qdrant · runQdrantRoute (NEW)</text>
    <rect x="600" y="322" width="92" height="20" rx="4" fill="#e2e8f0"/><text x="646" y="336" text-anchor="middle">route=agent</text>
  </g>

  <!-- ===== NODES ===== -->
  <!-- UI -->
  <g>
    <rect x="590" y="84" width="300" height="60" rx="10" fill="#7c3aed" stroke="#5b21b6"/>
    <text x="740" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Chat UI · spa-velocity</text>
    <text x="740" y="130" text-anchor="middle" font-size="11" fill="#ede9fe">POST /chat/.../messages/stream (SSE)</text>
  </g>
  <!-- ChatAgentService -->
  <g>
    <rect x="600" y="170" width="280" height="56" rx="10" fill="#475569" stroke="#334155"/>
    <text x="740" y="194" text-anchor="middle" font-size="13.5" font-weight="700" fill="#fff">ChatAgentService</text>
    <text x="740" y="213" text-anchor="middle" font-size="11" fill="#e2e8f0">generateReplyStreaming · dispatchRoute()</text>
  </g>
  <!-- Router -->
  <g>
    <rect x="555" y="242" width="370" height="58" rx="26" fill="#0891b2" stroke="#0e7490"/>
    <text x="740" y="266" text-anchor="middle" font-size="13.5" font-weight="700" fill="#fff">Router · classify()  (ChatOpenAI temp=0, JSON)</text>
    <text x="740" y="286" text-anchor="middle" font-size="11.5" fill="#cffafe">route → sql / rag / <tspan fill="#bbf7d0" font-weight="700">qdrant</tspan> / agent</text>
  </g>
  <!-- Outer agent -->
  <g>
    <rect x="420" y="358" width="280" height="94" rx="12" fill="#2563eb" stroke="#1d4ed8"/>
    <text x="560" y="384" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">OUTER CHAT AGENT</text>
    <text x="560" y="403" text-anchor="middle" font-size="11" fill="#dbeafe">createAgent · ChatOpenAI temp=0.2</text>
    <text x="560" y="421" text-anchor="middle" font-size="11" fill="#dbeafe">picks tool(s), synthesizes answer</text>
    <text x="560" y="439" text-anchor="middle" font-size="10.5" fill="#bfdbfe">tools: query_database · search_knowledge_base · query_qdrant</text>
  </g>

  <!-- SQL lane tool -->
  <g>
    <rect x="60" y="520" width="240" height="56" rx="10" fill="#d97706" stroke="#b45309"/>
    <text x="180" y="544" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Tool: query_database</text>
    <text x="180" y="563" text-anchor="middle" font-size="10.5" fill="#fff7ed">resolves a SQL connection</text>
  </g>
  <!-- Airweave lane tool -->
  <g>
    <rect x="650" y="520" width="260" height="56" rx="10" fill="#d97706" stroke="#b45309"/>
    <text x="780" y="544" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">Tool: search_knowledge_base</text>
    <text x="780" y="563" text-anchor="middle" font-size="10.5" fill="#fff7ed">retrieval, no sub-agent</text>
  </g>
  <!-- Qdrant lane tool (NEW) -->
  <g>
    <rect x="1175" y="520" width="250" height="56" rx="10" fill="#d97706" stroke="#15803d" stroke-width="2.5" stroke-dasharray="6 3"/>
    <text x="1300" y="544" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Tool: query_qdrant</text>
    <text x="1300" y="563" text-anchor="middle" font-size="10.5" fill="#fff7ed">wraps the Qdrant sub-agent</text>
    <rect x="1383" y="526" width="38" height="16" rx="4" fill="#15803d"/><text x="1402" y="538" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">NEW</text>
  </g>

  <!-- SQL column -->
  <g>
    <rect x="60" y="604" width="240" height="50" rx="10" fill="#475569" stroke="#334155"/>
    <text x="180" y="626" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">ChatToSqlService</text>
    <text x="180" y="644" text-anchor="middle" font-size="10.5" fill="#e2e8f0">askConnection()</text>
  </g>
  <g>
    <rect x="35" y="682" width="290" height="88" rx="12" fill="#2563eb" stroke="#1d4ed8"/>
    <text x="180" y="707" text-anchor="middle" font-size="13.5" font-weight="700" fill="#fff">SQL SUB-AGENT</text>
    <text x="180" y="726" text-anchor="middle" font-size="11" fill="#dbeafe">runSqlSubAgent · ChatOpenAI temp=0</text>
    <text x="180" y="744" text-anchor="middle" font-size="11" fill="#dbeafe">SqlToolkit: list-sql · info-sql ·</text>
    <text x="180" y="761" text-anchor="middle" font-size="11" fill="#dbeafe">query-sql  (schema → SQL loop)</text>
  </g>
  <g>
    <rect x="70" y="798" width="220" height="48" rx="10" fill="#475569" stroke="#334155"/>
    <text x="180" y="820" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">ReadOnlySqlDatabase</text>
    <text x="180" y="838" text-anchor="middle" font-size="10.5" fill="#e2e8f0">run() · identifier repair</text>
  </g>
  <g>
    <rect x="85" y="872" width="190" height="56" rx="10" fill="#16a34a" stroke="#15803d"/>
    <text x="180" y="896" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">Postgres / MySQL</text>
    <text x="180" y="914" text-anchor="middle" font-size="10.5" fill="#dcfce7">read-only · SQL connection</text>
  </g>

  <!-- Airweave column -->
  <g>
    <rect x="655" y="604" width="250" height="50" rx="10" fill="#475569" stroke="#334155"/>
    <text x="780" y="626" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">AirweaveService</text>
    <text x="780" y="644" text-anchor="middle" font-size="10.5" fill="#e2e8f0">searchCollection()</text>
  </g>
  <g>
    <rect x="655" y="682" width="250" height="74" rx="12" fill="#0d9488" stroke="#0f766e"/>
    <text x="780" y="708" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Airweave SDK</text>
    <text x="780" y="727" text-anchor="middle" font-size="11" fill="#ccfbf1">search.instant / search.classic</text>
    <text x="780" y="745" text-anchor="middle" font-size="11" fill="#ccfbf1">semantic · keyword · hybrid</text>
  </g>
  <g>
    <rect x="685" y="798" width="190" height="56" rx="10" fill="#16a34a" stroke="#15803d"/>
    <text x="780" y="822" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">Airweave vector store</text>
    <text x="780" y="840" text-anchor="middle" font-size="10.5" fill="#dcfce7">collection · embeddings</text>
  </g>

  <!-- Qdrant column (NEW) -->
  <g>
    <rect x="1155" y="604" width="290" height="94" rx="12" fill="#2563eb" stroke="#15803d" stroke-width="2.5" stroke-dasharray="6 3"/>
    <text x="1300" y="629" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">QDRANT SEARCH SUB-AGENT</text>
    <text x="1300" y="648" text-anchor="middle" font-size="10.5" fill="#dbeafe">runQdrantSubAgent · ChatOpenAI temp=0</text>
    <text x="1300" y="666" text-anchor="middle" font-size="10.5" fill="#dbeafe">tools: list-collections · describe-payload ·</text>
    <text x="1300" y="683" text-anchor="middle" font-size="10.5" fill="#dbeafe">build-filter · search  (filter/top-k loop)</text>
    <rect x="1403" y="610" width="38" height="16" rx="4" fill="#15803d"/><text x="1422" y="622" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">NEW</text>
  </g>
  <g>
    <rect x="1180" y="726" width="240" height="52" rx="10" fill="#0d9488" stroke="#15803d" stroke-width="2.5" stroke-dasharray="6 3"/>
    <text x="1300" y="749" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">Qdrant client</text>
    <text x="1300" y="767" text-anchor="middle" font-size="10.5" fill="#ccfbf1">@qdrant/js-client-rest</text>
    <rect x="1378" y="732" width="38" height="16" rx="4" fill="#15803d"/><text x="1397" y="744" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">NEW</text>
  </g>
  <g>
    <rect x="1210" y="804" width="180" height="56" rx="10" fill="#16a34a" stroke="#15803d" stroke-width="2.5" stroke-dasharray="6 3"/>
    <text x="1300" y="828" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">Qdrant collection</text>
    <text x="1300" y="846" text-anchor="middle" font-size="10.5" fill="#dcfce7">vectors · payload filters</text>
    <rect x="1348" y="810" width="38" height="16" rx="4" fill="#15803d"/><text x="1367" y="822" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">NEW</text>
  </g>

  <!-- column captions -->
  <g font-size="12" font-weight="700">
    <text x="180" y="956" text-anchor="middle" fill="#b45309">SQL connections lane</text>
    <text x="780" y="884" text-anchor="middle" fill="#0f766e">Airweave collections lane</text>
    <text x="1300" y="888" text-anchor="middle" fill="#166534">Qdrant lane (new)</text>
  </g>

  <!-- Legend -->
  <g font-size="12" fill="#334155">
    <rect x="40" y="1004" width="1400" height="56" rx="10" fill="#fff" stroke="#e2e8f0"/>
    <rect x="60" y="1024" width="18" height="14" rx="3" fill="#2563eb"/><text x="86" y="1036">LLM agent</text>
    <rect x="200" y="1024" width="18" height="14" rx="3" fill="#0891b2"/><text x="226" y="1036">Router</text>
    <rect x="320" y="1024" width="18" height="14" rx="3" fill="#d97706"/><text x="346" y="1036">Tool</text>
    <rect x="410" y="1024" width="18" height="14" rx="3" fill="#475569"/><text x="436" y="1036">Service</text>
    <rect x="520" y="1024" width="18" height="14" rx="3" fill="#0d9488"/><text x="546" y="1036">SDK / client</text>
    <rect x="650" y="1024" width="18" height="14" rx="3" fill="#16a34a"/><text x="676" y="1036">Data store</text>
    <rect x="770" y="1024" width="18" height="14" rx="3" fill="#7c3aed"/><text x="796" y="1036">Client</text>
    <rect x="870" y="1023" width="18" height="16" rx="3" fill="#fff" stroke="#15803d" stroke-width="2.5" stroke-dasharray="5 3"/><text x="896" y="1036">NEW (this change)</text>
  </g>
</svg>
