<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="1020" viewBox="0 0 1180 1020" font-family="Inter, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <marker id="arrowDash" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1180" height="1020" fill="#f8fafc"/>

  <!-- Title -->
  <text x="590" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">How LangChain manages the agents — Velocity chat</text>
  <text x="590" y="62" text-anchor="middle" font-size="13" fill="#475569">Router fast-path + Outer agent orchestrator + nested SQL sub-agent, over two data sources (SQL connections &amp; Airweave collections)</text>

  <!-- ============ EDGES (drawn first, under boxes) ============ -->
  <g stroke="#334155" stroke-width="1.6" fill="none" marker-end="url(#arrow)">
    <!-- top stack -->
    <path d="M590,150 L590,176"/>
    <path d="M590,234 L590,260"/>
    <!-- router to three branches -->
    <path d="M520,300 C400,330 300,330 240,366"/>
    <path d="M590,310 L590,356"/>
    <path d="M660,300 C780,330 880,330 940,366"/>
    <!-- routes -> tools (direct) -->
    <path d="M225,432 L225,474"/>
    <path d="M955,432 L955,474"/>
    <!-- outer agent -> both tools -->
    <path d="M520,452 C400,470 320,476 290,478"/>
    <path d="M680,452 C820,470 900,476 920,478"/>
    <!-- SQL column -->
    <path d="M225,532 L225,556"/>
    <path d="M225,606 L225,632"/>
    <path d="M225,720 L225,746"/>
    <path d="M225,796 L225,822"/>
    <!-- Collections column -->
    <path d="M955,532 L955,556"/>
    <path d="M955,606 L955,632"/>
    <path d="M955,710 L955,746"/>
  </g>

  <!-- streaming events back to UI (dashed) -->
  <g stroke="#94a3b8" stroke-width="1.5" fill="none" stroke-dasharray="6 5" marker-end="url(#arrowDash)">
    <path d="M905,118 L800,108"/>
  </g>

  <!-- edge labels -->
  <g font-size="12" fill="#1e293b">
    <rect x="300" y="318" width="84" height="20" rx="4" fill="#e2e8f0"/>
    <text x="342" y="332" text-anchor="middle">route = sql</text>
    <rect x="548" y="328" width="160" height="20" rx="4" fill="#e2e8f0"/>
    <text x="628" y="342" text-anchor="middle">route = agent / unsure</text>
    <rect x="800" y="318" width="84" height="20" rx="4" fill="#e2e8f0"/>
    <text x="842" y="332" text-anchor="middle">route = rag</text>
    <text x="150" y="468" text-anchor="middle" fill="#64748b" font-style="italic">direct invoke</text>
    <text x="1035" y="468" text-anchor="middle" fill="#64748b" font-style="italic">direct invoke</text>
  </g>

  <!-- ============ NODES ============ -->

  <!-- UI -->
  <g>
    <rect x="450" y="86" width="280" height="64" rx="10" fill="#7c3aed" stroke="#5b21b6"/>
    <text x="590" y="112" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Chat UI  ·  spa-velocity</text>
    <text x="590" y="132" text-anchor="middle" font-size="11.5" fill="#ede9fe">POST /chat/.../messages/stream  (SSE)</text>
  </g>

  <!-- ChatAgentService -->
  <g>
    <rect x="455" y="176" width="270" height="58" rx="10" fill="#475569" stroke="#334155"/>
    <text x="590" y="200" text-anchor="middle" font-size="13.5" font-weight="700" fill="#fff">ChatAgentService</text>
    <text x="590" y="219" text-anchor="middle" font-size="11.5" fill="#e2e8f0">generateReplyStreaming · loads project sources</text>
  </g>

  <!-- Router -->
  <g>
    <rect x="450" y="260" width="280" height="50" rx="25" fill="#0891b2" stroke="#0e7490"/>
    <text x="590" y="281" text-anchor="middle" font-size="13.5" font-weight="700" fill="#fff">Router · classify()</text>
    <text x="590" y="299" text-anchor="middle" font-size="11" fill="#cffafe">ChatOpenAI temp=0, JSON → sql / rag / agent</text>
  </g>

  <!-- runSqlRoute -->
  <g>
    <rect x="110" y="366" width="230" height="50" rx="10" fill="#64748b" stroke="#475569"/>
    <text x="225" y="388" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">runSqlRoute</text>
    <text x="225" y="406" text-anchor="middle" font-size="10.5" fill="#e2e8f0">skips outer agent</text>
  </g>

  <!-- runRagRoute -->
  <g>
    <rect x="840" y="366" width="230" height="50" rx="10" fill="#64748b" stroke="#475569"/>
    <text x="955" y="388" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">runRagRoute</text>
    <text x="955" y="406" text-anchor="middle" font-size="10.5" fill="#e2e8f0">skips outer agent</text>
  </g>

  <!-- Outer agent -->
  <g>
    <rect x="448" y="358" width="284" height="94" rx="12" fill="#2563eb" stroke="#1d4ed8"/>
    <text x="590" y="384" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">OUTER CHAT AGENT</text>
    <text x="590" y="403" text-anchor="middle" font-size="11" fill="#dbeafe">createAgent · ChatOpenAI temp=0.2</text>
    <text x="590" y="421" text-anchor="middle" font-size="11" fill="#dbeafe">decides which tool(s) to call,</text>
    <text x="590" y="438" text-anchor="middle" font-size="11" fill="#dbeafe">then synthesizes the answer</text>
  </g>

  <!-- Tool: query_database -->
  <g>
    <rect x="110" y="474" width="230" height="58" rx="10" fill="#d97706" stroke="#b45309"/>
    <text x="225" y="498" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Tool: query_database</text>
    <text x="225" y="517" text-anchor="middle" font-size="10.5" fill="#fff7ed">resolves a SQL connection</text>
  </g>

  <!-- Tool: search_knowledge_base -->
  <g>
    <rect x="840" y="474" width="230" height="58" rx="10" fill="#d97706" stroke="#b45309"/>
    <text x="955" y="498" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">Tool: search_knowledge_base</text>
    <text x="955" y="517" text-anchor="middle" font-size="10.5" fill="#fff7ed">retrieval, no sub-agent</text>
  </g>

  <!-- SQL column -->
  <g>
    <rect x="110" y="556" width="230" height="50" rx="10" fill="#475569" stroke="#334155"/>
    <text x="225" y="578" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">ChatToSqlService</text>
    <text x="225" y="596" text-anchor="middle" font-size="10.5" fill="#e2e8f0">askConnection()</text>
  </g>
  <g>
    <rect x="80" y="632" width="290" height="88" rx="12" fill="#2563eb" stroke="#1d4ed8"/>
    <text x="225" y="657" text-anchor="middle" font-size="13.5" font-weight="700" fill="#fff">SQL SUB-AGENT</text>
    <text x="225" y="676" text-anchor="middle" font-size="11" fill="#dbeafe">runSqlSubAgent · ChatOpenAI temp=0</text>
    <text x="225" y="694" text-anchor="middle" font-size="11" fill="#dbeafe">SqlToolkit: list-sql · info-sql ·</text>
    <text x="225" y="711" text-anchor="middle" font-size="11" fill="#dbeafe">query-sql  (schema → SQL loop)</text>
  </g>
  <g>
    <rect x="115" y="746" width="220" height="50" rx="10" fill="#475569" stroke="#334155"/>
    <text x="225" y="768" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">ReadOnlySqlDatabase</text>
    <text x="225" y="786" text-anchor="middle" font-size="10.5" fill="#e2e8f0">run() · identifier repair</text>
  </g>
  <g>
    <rect x="130" y="822" width="190" height="56" rx="10" fill="#16a34a" stroke="#15803d"/>
    <text x="225" y="846" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">Postgres / MySQL</text>
    <text x="225" y="864" text-anchor="middle" font-size="10.5" fill="#dcfce7">read-only  ·  SQL connection</text>
  </g>

  <!-- Collections column -->
  <g>
    <rect x="840" y="556" width="230" height="50" rx="10" fill="#475569" stroke="#334155"/>
    <text x="955" y="578" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">AirweaveService</text>
    <text x="955" y="596" text-anchor="middle" font-size="10.5" fill="#e2e8f0">searchCollection()</text>
  </g>
  <g>
    <rect x="840" y="632" width="230" height="78" rx="12" fill="#0d9488" stroke="#0f766e"/>
    <text x="955" y="657" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Airweave SDK</text>
    <text x="955" y="676" text-anchor="middle" font-size="11" fill="#ccfbf1">search.instant / search.classic</text>
    <text x="955" y="694" text-anchor="middle" font-size="11" fill="#ccfbf1">semantic · keyword · hybrid</text>
  </g>
  <g>
    <rect x="862" y="746" width="186" height="56" rx="10" fill="#16a34a" stroke="#15803d"/>
    <text x="955" y="770" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">Airweave vector store</text>
    <text x="955" y="788" text-anchor="middle" font-size="10.5" fill="#dcfce7">collection  ·  embeddings</text>
  </g>

  <!-- SSE events note -->
  <g>
    <rect x="780" y="86" width="370" height="64" rx="10" fill="#fff" stroke="#cbd5e1" stroke-dasharray="5 4"/>
    <text x="965" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">Streams back to UI (SSE)</text>
    <text x="965" y="126" text-anchor="middle" font-size="10.5" fill="#64748b">searching · sql_planning · sql_executing ·</text>
    <text x="965" y="142" text-anchor="middle" font-size="10.5" fill="#64748b">sql_executed · chunk · done · complete</text>
  </g>

  <!-- Legend -->
  <g font-size="12" fill="#334155">
    <rect x="40" y="936" width="1100" height="56" rx="10" fill="#fff" stroke="#e2e8f0"/>
    <rect x="60" y="956" width="18" height="14" rx="3" fill="#2563eb"/><text x="86" y="968">LLM-driven agent</text>
    <rect x="220" y="956" width="18" height="14" rx="3" fill="#0891b2"/><text x="246" y="968">Router (classifier)</text>
    <rect x="380" y="956" width="18" height="14" rx="3" fill="#d97706"/><text x="406" y="968">Tool</text>
    <rect x="470" y="956" width="18" height="14" rx="3" fill="#475569"/><text x="496" y="968">Service</text>
    <rect x="580" y="956" width="18" height="14" rx="3" fill="#0d9488"/><text x="606" y="968">External SDK</text>
    <rect x="710" y="956" width="18" height="14" rx="3" fill="#16a34a"/><text x="736" y="968">Data store</text>
    <rect x="830" y="956" width="18" height="14" rx="3" fill="#7c3aed"/><text x="856" y="968">Client</text>
    <text x="980" y="968" fill="#94a3b8" font-style="italic">dashed = streamed events</text>
  </g>
</svg>
