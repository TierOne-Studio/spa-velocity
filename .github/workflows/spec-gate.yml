name: spec-gate

# Specification-first hard gate (SPEC-000 / ADR-011).
# A behavioral src/** change must ship with a docs/specs/** update (or a [skip-spec:…] waiver).
# Plus deterministic spec lints (completeness + cross-links).

on:
  pull_request:
    branches: [main]

jobs:
  spec-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Spec-first gate (behavioral src ⇒ spec change)
        env:
          BASE: origin/${{ github.base_ref }}
          # PR body via env (NOT inline ${{ }}) to avoid script injection.
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          MSG="$PR_BODY
          $(git log "$BASE...HEAD" --format=%B)"
          SPEC_GATE_BASE="$BASE" SPEC_GATE_MSG="$MSG" bash scripts/spec-gate.sh

      - name: Spec completeness lint
        run: bash scripts/spec-complete-check.sh

      - name: Spec cross-link lint
        run: bash scripts/spec-links-check.sh
