# SonarCloud analysis configuration (read by SonarCloud Automatic Analysis).
#
# Exclude test and e2e files from copy-paste / duplication (CPD) detection.
# Duplication in unit-test setup (mock wiring, render/QueryClient boilerplate)
# and Playwright e2e specs is expected, low-value repetition — not meaningful
# technical debt, and not worth gating a PR on. Production-code duplication is
# still detected and gated normally.
sonar.cpd.exclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,e2e/**
